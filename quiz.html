<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z/OS Expert Assessment Suite</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- pdf generation library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .tech-mono { font-family: 'JetBrains Mono', monospace; }
        .correct-glow { animation: glow-green 2s infinite; }
        @keyframes glow-green { 0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); } 50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); } }

        /* modern custom scrollbar styling */
        /* WebKit browsers */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(100,100,100,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(100,100,100,0.7); }
        /* Firefox */
        * { scrollbar-width: thin; scrollbar-color: rgba(100,100,100,0.5) transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- THE DATA IMPORTER ---
        // Instead of hard-coding questions we load all JSON files from
        // the same directory. Each file is expected to export an array of
        // questions in the format produced by the existing JSON bank
        // (see cobol.json for example). The loader maps them into the
        // simplified structure used by the quiz engine.

        // helper which will be called in the component
        const loadQuestionBank = async () => {
            const files = [
                'cobol.json',
                'db2.json',
                'ims.json',
                'jcl-vsam.json'
            ];
            let master = [];
            for (const fname of files) {
                try {
                    const resp = await fetch(fname);
                    if (!resp.ok) throw new Error(`failed to fetch ${fname}`);
                    const arr = await resp.json();
                    const mapped = arr.map(item => {
                        // build ID from topic initial + questionnumber to
                        // guarantee uniqueness
                        const id = `${item.topic.charAt(0)}${item.questionnumber}`;
                        const opts = [];
                        for (let i = 1; i <= 4; i++) {
                            const o = item[`option_${i}`];
                            if (o && o.trim() !== '') opts.push(o);
                        }
                        const ans = (item.correct_answer || []).map(a => {
                            const idx = parseInt(a.replace('option_',''), 10) - 1;
                            return isNaN(idx) ? null : idx;
                        }).filter(x => x !== null);
                        return {
                            id,
                            topic: item.topic,
                            q: item.question,
                            opt: opts,
                            ans
                        };
                    });
                    master = master.concat(mapped);
                } catch (e) {
                    // missing files are ignored, but you may want to show
                    // a console warning when debugging
                    console.warn(e);
                }
            }
            return master;
        };

        const App = () => {
            const [view, setView] = useState('menu');
            const [sessionQuestions, setSessionQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selected, setSelected] = useState([]);
            const [feedbackGiven, setFeedbackGiven] = useState(false);
            const [masterBank, setMasterBank] = useState([]);
            const [loadingBank, setLoadingBank] = useState(true);
            const themes = ['dark','light','blue','solarized','highcontrast'];
            const [themeIndex, setThemeIndex] = useState(0);
            const theme = themes[themeIndex];
            // helper to select per-theme value (order matches themes array)
            const t = (...vals) => vals[themeIndex] || vals[0];
            const [sessionResults, setSessionResults] = useState(null); // stores results after drill
            const [sessionAnswers, setSessionAnswers] = useState([]); // user selections per question
            const [sessionStartTime, setSessionStartTime] = useState(null); // timestamp when drill begins
            const [correctIds, setCorrectIds] = useState(() => {
                const saved = localStorage.getItem('zos_correct_ids');
                return saved ? JSON.parse(saved) : [];
            });

            // Persistence: Load attended question counts (not just IDs) from storage
            const [questionAttempts, setQuestionAttempts] = useState(() => {
                const saved = localStorage.getItem('zos_question_attempts');
                return saved ? JSON.parse(saved) : {};
            });

            const [attendedIds, setAttendedIds] = useState(() => {
                const saved = localStorage.getItem('zos_attended_ids');
                return saved ? JSON.parse(saved) : [];
            });

            // flagged questions for review
            const [flaggedIds, setFlaggedIds] = useState(() => {
                const saved = localStorage.getItem('zos_flagged_ids');
                return saved ? JSON.parse(saved) : [];
            });
            const [showBucket, setShowBucket] = useState(false);

            // user choices on home screen
            const [selectedTopics, setSelectedTopics] = useState([]);
            const [questionCount, setQuestionCount] = useState(2);            const [mode, setMode] = useState('practice'); // 'practice', 'assessment', or 'custom'
            const [timeLeft, setTimeLeft] = useState(90);
            const [customTimeMins, setCustomTimeMins] = useState(30); // total minutes for custom quiz
            const [showAnswer, setShowAnswer] = useState(false); // practice peek
            const [showQuestionModal, setShowQuestionModal] = useState(false);
            const [selectedQuestionForModal, setSelectedQuestionForModal] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(true); // home sidebar toggle
            // derive a unique topic list when bank loads
            const topicList = useMemo(() => {
                const set = new Set(masterBank.map(q => q.topic));
                return Array.from(set);
            }, [masterBank]);

            // load JSON bank once when component mounts
            useEffect(() => {
                (async () => {
                    const bank = await loadQuestionBank();
                    setMasterBank(bank);
                    setLoadingBank(false);
                })();
            }, []);

            // --- SESSION LOGIC ---
            // compute how many questions would be available with current filters
            const availableCount = useMemo(() => {
                // count questions not yet answered correctly
                let pool = masterBank.filter(q => !correctIds.includes(q.id));
                if (pool.length === 0) pool = masterBank.slice();
                if (selectedTopics.length > 0) {
                    pool = pool.filter(q => selectedTopics.includes(q.topic));
                }
                return pool.length;
            }, [masterBank, correctIds, selectedTopics]);

            const toggleFlag = (qid) => {
                let newArr;
                if (flaggedIds.includes(qid)) {
                    newArr = flaggedIds.filter(x => x !== qid);
                } else {
                    newArr = [...flaggedIds, qid];
                }
                setFlaggedIds(newArr);
                localStorage.setItem('zos_flagged_ids', JSON.stringify(newArr));
            };

            const downloadFlaggedPdf = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const flaggedQuestions = masterBank.filter(q => flaggedIds.includes(q.id));
                if (flaggedQuestions.length === 0) return;
                flaggedQuestions.forEach((q, idx) => {
                    if (idx > 0) doc.addPage();
                    // Title
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(18);
                    doc.setTextColor('#2563eb');
                    doc.text('z/OS Review Bucket', 10, 15);
                    doc.setFontSize(12);
                    doc.setTextColor('#334155');
                    doc.text(`Exported: ${new Date().toLocaleDateString()}`, 150, 15, { align: 'right' });
                    // Topic
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(12);
                    doc.setTextColor('#0ea5e9');
                    doc.text(`Topic: ${q.topic}`, 10, 25);
                    // Question box
                    doc.setDrawColor('#2563eb');
                    doc.setFillColor('#e0e7ff');
                    doc.roundedRect(10, 30, 190, 20, 3, 3, 'F');
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(13);
                    doc.setTextColor('#1e293b');
                    doc.text(`${idx + 1}. ${q.q}`, 15, 42);
                    // Options
                    let y = 55;
                    q.opt.forEach((opt, oi) => {
                        const isCorrect = q.ans.includes(oi);
                        doc.setDrawColor(isCorrect ? '#22c55e' : '#cbd5e1');
                        doc.setFillColor(isCorrect ? '#dcfce7' : '#f1f5f9');
                        doc.roundedRect(15, y - 4, 180, 10, 2, 2, 'F');
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(11);
                        doc.setTextColor('#334155');
                        const textOpt = `${String.fromCharCode(65 + oi)}. ${opt}` + (isCorrect ? ' ✅' : '');
                        doc.text(textOpt, 20, y + 3);
                        y += 14;
                    });
                    // Footer
                    doc.setFontSize(10);
                    doc.setTextColor('#64748b');
                    doc.text('Generated by z/OS Assessment Suite', 10, 285);
                });
                doc.save('flagged_questions.pdf');
                // clear after download
                setFlaggedIds([]);
                localStorage.removeItem('zos_flagged_ids');
            };

            const startNewDrill = () => {
                if (loadingBank) return; // still loading

                // questions that have not been correctly answered yet
                let pool = masterBank.filter(q => !correctIds.includes(q.id));
                if (selectedTopics.length > 0) {
                    pool = pool.filter(q => selectedTopics.includes(q.topic));
                }
                if (pool.length === 0) {
                    // nothing left correct; fall back to full bank
                    pool = masterBank.slice();
                    if (selectedTopics.length > 0) {
                        pool = pool.filter(q => selectedTopics.includes(q.topic));
                    }
                }
                // shuffle and slice
                pool = pool.sort(() => Math.random() - 0.5);
                const count = Math.max(1, Math.min(questionCount, pool.length));
                const drillSet = pool.slice(0, count);

                setSessionQuestions(drillSet);
                setCurrentIdx(0);
                setSessionAnswers(Array(drillSet.length).fill([]));
                setSessionStartTime(Date.now());
                setView('drill');
                setFeedbackGiven(false);
                setSelected([]);
                setShowAnswer(false);
                // reset timer when new drill starts
                if (mode === 'assessment') {
                    setTimeLeft(90);
                } else if (mode === 'custom') {
                    setTimeLeft(Math.round(customTimeMins * 60));
                }
            };

            const handleSubmit = () => {
                setFeedbackGiven(true);
                const currentId = sessionQuestions[currentIdx].id;
                
                // determine correctness
                const isCorrect = sessionQuestions[currentIdx].ans.every(a => selected.includes(a)) && selected.every(s => sessionQuestions[currentIdx].ans.includes(s));

                // record the user's selection for review
                setSessionAnswers(prev => {
                    const arr = [...prev];
                    arr[currentIdx] = selected;
                    return arr;
                });

                // Persistence: Mark as attended and increment attempt count
                if (!attendedIds.includes(currentId)) {
                    const newAttended = [...attendedIds, currentId];
                    setAttendedIds(newAttended);
                    localStorage.setItem('zos_attended_ids', JSON.stringify(newAttended));
                }

                // update correct set
                let newCorrect = [...correctIds];
                if (isCorrect) {
                    if (!newCorrect.includes(currentId)) {
                        newCorrect.push(currentId);
                    }
                } else {
                    newCorrect = newCorrect.filter(id => id !== currentId);
                }
                setCorrectIds(newCorrect);
                localStorage.setItem('zos_correct_ids', JSON.stringify(newCorrect));

                // Track attempt count
                const newAttempts = { ...questionAttempts };
                newAttempts[currentId] = (newAttempts[currentId] || 0) + 1;
                setQuestionAttempts(newAttempts);
                localStorage.setItem('zos_question_attempts', JSON.stringify(newAttempts));
            };

            const handleNext = () => {
                if (currentIdx < sessionQuestions.length - 1) {
                    setCurrentIdx(prev => prev + 1);
                    setFeedbackGiven(false);
                    setSelected([]);
                    setShowAnswer(false);
                } else {
                    // Fix: Populate sessionResults before switching views
                    setSessionResults({
                        totalQuestions: sessionQuestions.length,
                        mode: mode,
                        questions: sessionQuestions,
                        answers: sessionAnswers,
                        startTime: sessionStartTime,
                        endTime: Date.now()
                    });
                    setView('results');
                }
            };

            // timer effects for assessment mode
            useEffect(() => {
                if (view === 'drill' && !feedbackGiven) {
                    // only reset timer upon drill start or when mode changes
                    if (mode === 'assessment') {
                        setTimeLeft(90);
                    }
                    const interval = setInterval(() => {
                        setTimeLeft(t => (t > 0 ? t - 1 : 0));
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [view, mode, feedbackGiven]);

            useEffect(() => {
                if ((mode === 'assessment' || mode === 'custom') && view === 'drill' && timeLeft === 0) {
                    // timer expired: stop and reveal correct answer but do not advance
                    setFeedbackGiven(true);
                }
            }, [timeLeft, mode, view]);

            // Helper functions
            const getAttemptCount = (qId) => questionAttempts[qId] || 0;

            const getColorByAttempts = (qId) => {
                const count = getAttemptCount(qId);
                if (count === 0) {
                    // neutral when never attempted
                    return t('bg-slate-800','bg-slate-200','bg-blue-200','bg-green-200','bg-gray-300');
                }
                // distinct gradient from yellow to red as attempts increase
                const gradient = ['bg-yellow-200','bg-yellow-300','bg-orange-300','bg-orange-400','bg-red-400','bg-red-500','bg-red-600','bg-red-700'];
                return gradient[Math.min(count-1, gradient.length - 1)];
            };

            const getOptionStyles = (idx) => {
                const q = sessionQuestions[currentIdx];
                const isCorrect = q.ans.includes(idx);
                const isUserSelected = selected.includes(idx);

                // before feedback given
                if (!feedbackGiven) {
                    if (mode === 'practice' && showAnswer) {
                        // highlight correct answer in practice peek
                        if (isCorrect) return 'border-green-500 bg-green-500/20 text-green-400 correct-glow font-bold';
                        return 'border-slate-800 hover:border-slate-600 bg-slate-900/50';
                    }
                    return isUserSelected 
                        ? 'border-blue-500 bg-blue-500/20' 
                        : 'border-slate-800 hover:border-slate-600 bg-slate-900/50';
                }

                if (isCorrect) return 'border-green-500 bg-green-500/20 text-green-400 correct-glow font-bold';
                if (isUserSelected && !isCorrect) return 'border-red-500 bg-red-500/20 text-red-400 font-bold strike-through';
                return 'border-slate-900 opacity-30 grayscale';
            };

            return (
                <div className={`min-h-screen p-6 flex flex-col ${t('bg-slate-950 text-white','bg-white text-slate-900','bg-blue-50 text-blue-900','bg-green-900 text-green-200','bg-black text-yellow-400')}`}>
                    {/* Header Persistence Stats */}
                    <div className={`flex justify-between items-center mb-10 border-b ${t('border-slate-800','border-slate-300','border-blue-200','border-green-700','border-yellow-400')} pb-4`}>
                        <div className="flex items-center gap-3">
                            {/* map toggle */}
                            <button
                                onClick={() => setSidebarOpen(open => !open)}
                                className="px-3 py-2 bg-blue-600 rounded-lg text-sm font-bold hover:bg-blue-500 transition-all"
                                title={sidebarOpen ? 'Hide Map' : 'Show Map'}
                            >
                                ☰
                            </button>

                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black">Z</div>
                            <h1 className="font-extrabold tracking-tighter text-xl">z/OS Assessment</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            {view !== 'menu' && (
                                <button
                                    onClick={() => setView('menu')}
                                    className="px-4 py-2 bg-slate-700 rounded-lg text-sm font-bold hover:bg-slate-600 transition-all"
                                >
                                    Home
                                </button>
                            )}
                            {view === 'drill' && (
                                <div className="text-[10px] uppercase text-slate-500 font-bold tracking-widest">
                                    {attendedIds.length} / {loadingBank ? '...' : masterBank.length}
                                </div>
                            )}
                            {/* review bucket icon (save/floppy) */}
                            <button
                                onClick={() => setShowBucket(true)}
                                className="relative px-2 py-2 bg-slate-700 rounded-lg text-sm font-bold hover:bg-slate-600 transition-all"
                                title="Review Bucket"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm5-10H7V5h10v4z" />
                                </svg>
                                {flaggedIds.length > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-red-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center">
                                        {flaggedIds.length}
                                    </span>
                                )}
                            </button>
                            <button
                                onClick={() => setThemeIndex((themeIndex + 1) % themes.length)}
                                className="px-4 py-2 bg-slate-700 rounded-lg text-sm font-bold hover:bg-slate-600 transition-all"
                            >
                                {theme.charAt(0).toUpperCase() + theme.slice(1)}
                            </button>
                        </div>
                    </div>



                    {view === 'menu' && (
                        <div className="relative flex-1">

                            {/* overlay backdrop when open */}
                            {sidebarOpen && (
                                <div
                                    className="fixed inset-0 bg-black/40 z-40"
                                    onClick={() => setSidebarOpen(false)}
                                />
                            )}

                            {/* sidebar as modal panel */}
                            {sidebarOpen && (
                                <div className="fixed left-0 top-0 bottom-0 w-96 p-4 bg-slate-900 text-white z-50 overflow-y-auto">
                                    {!loadingBank && masterBank.length > 0 && (
                                        <>
                                            <p className="text-sm font-semibold mb-4">Overall Topic Progress (click to preview):</p>
                                            {topicList.map(topic => (
                                                <div key={topic} className="mb-6">
                                                    <h4 className="text-lg font-bold mb-2">{topic} ({masterBank.filter(q => q.topic === topic).length}Q)</h4>
                                                    <div className="flex flex-wrap gap-1">
                                                        {masterBank.filter(q => q.topic === topic).map(q => (
                                                            <button
                                                                key={q.id}
                                                                onClick={() => {
                                                                    const idx = masterBank.findIndex(x=>x.id===q.id);
                                                                    setSelectedQuestionForModal(idx);
                                                                    setShowQuestionModal(true);
                                                                }}
                                                                className={`w-7 h-7 rounded text-[10px] font-bold transition-all hover:scale-125 ${getColorByAttempts(q.id)} text-slate-900 hover:ring-2 hover:ring-blue-400`}
                                                                title={`${q.id}: ${q.q}\nAttempts: ${getAttemptCount(q.id)}`}
                                                            >
                                                                {(masterBank.findIndex(x => x.id === q.id) % 100) || '.'}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    )}
                                </div>
                            )}

                            {/* controls column */}
                            <div className="flex flex-col justify-center items-center text-center">
                                <h2 className="text-5xl font-black mb-6">Ready for the Drill?</h2>
                                <p className="text-slate-400 max-w-md mb-12">The system will fetch a fresh batch of unattended questions from your COBOL, DB2, IMS and JCL modules.</p>

                                {/* topic filters as toggle chips */}
                                {topicList.length > 0 && (
                                    <div className="mb-6 text-left">
                                        <p className="text-sm font-semibold mb-2">Topics (tap to toggle):</p>
                                        <div className="flex flex-wrap gap-3">
                                            {topicList.map(t => (
                                                <button
                                                    key={t}
                                                    onClick={() => {
                                                        setSelectedTopics(prev =>
                                                            prev.includes(t)
                                                                ? prev.filter(x => x !== t)
                                                                : [...prev, t]
                                                        );
                                                    }}
                                                    className={`px-5 py-2 rounded-2xl text-base font-semibold transition-colors 
                                                        ${selectedTopics.includes(t)
                                                            ? 'bg-blue-600 text-white'
                                                            : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                                >
                                                    {t}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* mode selection as buttons */}
                                <div className="mb-6 flex gap-4">
                                    <button
                                        onClick={() => setMode('practice')}
                                        className={`px-4 py-2 rounded-lg font-semibold transition-colors 
                                            ${mode === 'practice' ? 'bg-green-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                    >Practice</button>
                                    <button
                                        onClick={() => setMode('assessment')}
                                        className={`px-4 py-2 rounded-lg font-semibold transition-colors 
                                            ${mode === 'assessment' ? 'bg-red-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                    >Assessment</button>
                                    <button
                                        onClick={() => setMode('custom')}
                                        className={`px-4 py-2 rounded-lg font-semibold transition-colors 
                                            ${mode === 'custom' ? 'bg-yellow-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                    >Custom</button>
                                </div>
                                {mode === 'custom' && (
                                    <div className="mb-6 flex items-center gap-2">
                                        <label className="text-sm font-semibold">Total time (mins):</label>
                                        <button
                                            onClick={() => setCustomTimeMins(prev => Math.max(0, prev - 10))}
                                            className="px-2 py-1 bg-red-600 text-white rounded hover:bg-red-500"
                                        >
                                            -10
                                        </button>
                                        <button
                                            onClick={() => setCustomTimeMins(prev => Math.max(0, prev - 5))}
                                            className="px-2 py-1 bg-red-400 text-white rounded hover:bg-red-300"
                                        >
                                            -5
                                        </button>
                                        <input
                                            type="number"
                                            min="0"
                                            step="5"
                                            value={customTimeMins}
                                            onChange={e => setCustomTimeMins(parseFloat(e.target.value) || 0)}
                                            className="w-24 px-2 py-1 rounded bg-slate-800 text-white text-center"
                                        />
                                        <button
                                            onClick={() => setCustomTimeMins(prev => prev + 5)}
                                            className="px-2 py-1 bg-green-400 text-white rounded hover:bg-green-300"
                                        >
                                            +5
                                        </button>
                                        <button
                                            onClick={() => setCustomTimeMins(prev => prev + 10)}
                                            className="px-2 py-1 bg-green-600 text-white rounded hover:bg-green-500"
                                        >
                                            +10
                                        </button>
                                    </div>
                                )}

                                {/* question count slider + input */}
                                <div className="mb-6 flex flex-col gap-2">
                                    <label className="text-sm font-semibold">Number of questions: <span className="font-bold">{questionCount}</span></label>
                                    <div className="flex items-center gap-4">
                                        <input
                                            type="range"
                                            min="1"
                                            max={masterBank.length || 1}
                                            value={questionCount}
                                            onChange={e => setQuestionCount(parseInt(e.target.value, 10) || 1)}
                                            className="flex-1"
                                        />
                                        <input
                                            type="number"
                                            min="1"
                                            max={masterBank.length || ''}
                                            value={questionCount}
                                            onChange={e => setQuestionCount(parseInt(e.target.value, 10) || 1)}
                                            className="w-20 px-2 py-1 rounded bg-slate-800 text-white"
                                        />
                                    </div>
                                </div>
                                <button 
                                    onClick={startNewDrill}
                                    disabled={
                                        loadingBank || masterBank.length === 0 || questionCount < 1 || availableCount === 0
                                    }
                                    className="px-16 py-5 bg-blue-600 rounded-2xl font-black text-xl hover:scale-105 active:scale-95 transition-all shadow-xl shadow-blue-900/20 disabled:opacity-50"
                                >
                                    {loadingBank ? 'Loading questions...' : `Start New Batch (${questionCount})`}
                                </button>
                                {availableCount !== undefined && !loadingBank && (
                                    <p className="text-xs text-slate-500 mt-2">
                                        {availableCount} question{availableCount === 1 ? '' : 's'} available with current filters
                                    </p>
                                )}
                                <button 
                                    onClick={() => { localStorage.clear(); setAttendedIds([]); setQuestionAttempts({}); }}
                                    className="mt-8 text-slate-600 text-xs hover:text-red-400 underline"
                                >
                                    Reset Mastery History
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'drill' && (
                        <div className="flex-1">
                            {/* Main Content */}
                            <div className="flex-1">
                                <div className="flex justify-between items-end mb-10">
                                    <div>
                                        <span className="px-3 py-1 bg-slate-800 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                            Module: {sessionQuestions[currentIdx].topic}
                                        </span>
                                        <h3 className="text-sm text-slate-500 mt-2 font-bold">Question {currentIdx + 1} of {sessionQuestions.length}</h3>
                                    </div>
                                    {/* flag toggle */}
                                    <button
                                        onClick={() => toggleFlag(sessionQuestions[currentIdx].id)}
                                        className={`px-2 py-1 rounded-lg text-sm font-bold transition-all ${flaggedIds.includes(sessionQuestions[currentIdx].id) ? 'bg-blue-500 hover:bg-blue-400 text-white' : 'bg-yellow-500 hover:bg-yellow-400 text-black'}`}
                                        title={flaggedIds.includes(sessionQuestions[currentIdx].id) ? 'Remove from review' : 'Mark for review'}
                                    >
                                        {flaggedIds.includes(sessionQuestions[currentIdx].id) ? (
                                            /* solid bookmark */
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 inline" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M6 2a2 2 0 0 0-2 2v18l8-6 8 6V4a2 2 0 0 0-2-2H6z" />
                                            </svg>
                                        ) : (
                                            /* outline bookmark */
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M6 2a2 2 0 0 0-2 2v18l8-6 8 6V4a2 2 0 0 0-2-2H6z" />
                                            </svg>
                                        )}
                                    </button>
                                    {(mode === 'assessment' || mode === 'custom') && (
                                        <div className="text-red-400 tech-mono font-bold">
                                            Time left: {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}
                                        </div>
                                    )}
                                    {feedbackGiven && (
                                        <div className="text-green-500 tech-mono text-sm animate-bounce font-bold"></div>
                                    )}
                                </div>

                                <h2 className="text-xl font-semibold leading-tight mb-6 tech-mono">
                                    {sessionQuestions[currentIdx].q}
                                </h2>

                                <div className="grid grid-cols-1 gap-1">
                                    {sessionQuestions[currentIdx].opt.map((text, i) => (
                                        <button
                                            key={i}
                                            disabled={feedbackGiven}
                                            onClick={() => setSelected([i])}
                                            className={`p-2 text-left border-2 rounded-lg transition-all flex items-start gap-2 ${getOptionStyles(i)}`}
                                        >
                                            <span className="w-5 h-5 rounded bg-slate-800 flex items-center justify-center text-[10px] font-bold flex-shrink-0 mt-0.5">
                                                {String.fromCharCode(65 + i)}
                                            </span>
                                            <span className="text-sm">{text}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="mt-16 flex justify-end items-center gap-4">
                                    {mode === 'practice' && !feedbackGiven && (
                                        <button
                                            onClick={() => {
                                                setShowAnswer(true);
                                                // move to next question shortly after revealing
                                                setTimeout(handleNext, 500);
                                            }}
                                            className="px-10 py-3 bg-yellow-500 rounded-xl font-bold hover:bg-yellow-400 transition-all shadow-lg text-black"
                                        >
                                            Peek & Next
                                        </button>
                                    )}
                                    {!feedbackGiven ? (
                                        <button 
                                            onClick={handleSubmit}
                                            disabled={selected.length === 0}
                                            className="px-12 py-4 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 disabled:opacity-30 transition-all shadow-lg"
                                        >
                                            Verify Selection
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={handleNext}
                                            className="px-12 py-4 bg-slate-700 rounded-xl font-bold hover:bg-slate-600 flex items-center gap-3 transition-all"
                                        >
                                            {currentIdx === sessionQuestions.length - 1 ? 'View Results' : 'Next Question'} <span>→</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal for Question Preview */}
                    {showQuestionModal && selectedQuestionForModal !== null && (() => {
                        const sourceArray = view === 'drill' ? sessionQuestions : masterBank;
                        const qIndex = selectedQuestionForModal;
                        const qObj = sourceArray[qIndex];
                        return (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                <div className={`${t('bg-slate-900','bg-white','bg-blue-200','bg-green-800','bg-black')} rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto`}>
                                    <div className={`sticky top-0 ${t('bg-slate-800','bg-slate-200','bg-blue-400','bg-green-600','bg-black')} p-4 flex justify-between items-center border-b ${t('border-slate-700','border-slate-300','border-blue-300','border-green-500','border-yellow-400')}`}>
                                        <h3 className="text-lg font-bold">Question {qIndex + 1}</h3>
                                        <button
                                            onClick={() => setShowQuestionModal(false)}
                                            className="text-xl hover:text-red-400 transition-all"
                                        >
                                            ✕
                                        </button>
                                    </div>
                                    <div className="p-6">
                                        <h2 className="text-2xl font-semibold leading-snug mb-6 tech-mono">
                                            {qObj.q}
                                        </h2>
                                        <div className="space-y-3">
                                            {qObj.opt.map((text, i) => (
                                                <div
                                                    key={i}
                                                    className={`p-4 border-2 rounded-lg ${
                                                        qObj.ans.includes(i)
                                                            ? 'border-green-500 bg-green-500/10'
                                                            : t('border-slate-700 bg-slate-800','border-slate-300 bg-slate-50','border-blue-300 bg-blue-200','border-green-600 bg-green-700','border-yellow-400 bg-black')
                                                    }`}>
                                                    <span className="font-bold mr-3">{String.fromCharCode(65 + i)}:</span>
                                                    <span>{text}</span>
                                                    {qObj.ans.includes(i) && (
                                                        <span className="ml-2 text-green-400 font-bold">✓ Correct</span>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-6 flex gap-3">
                                            {view === 'drill' ? (
                                                <button
                                                    onClick={() => {
                                                        setCurrentIdx(qIndex);
                                                        setFeedbackGiven(false);
                                                        setSelected([]);
                                                        setShowAnswer(false);
                                                        setShowQuestionModal(false);
                                                    }}
                                                    className="flex-1 px-4 py-2 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition-all"
                                                >
                                                    Go to Question
                                                </button>
                                            ) : null}
                                            <button
                                                onClick={() => setShowQuestionModal(false)}
                                                className="flex-1 px-4 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600 transition-all"
                                            >
                                                Close
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                    {/* Bucket/flagged questions modal */}
                    {showBucket && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className={`${t('bg-slate-900','bg-white','bg-blue-200','bg-green-800','bg-black')} rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto`}>
                                <div className={`sticky top-0 ${t('bg-slate-800','bg-slate-200','bg-blue-400','bg-green-600','bg-black')} p-4 flex justify-between items-center border-b ${t('border-slate-700','border-slate-300','border-blue-300','border-green-500','border-yellow-400')}`}>
                                    <h3 className="text-lg font-bold">Review Bucket ({flaggedIds.length})</h3>
                                    <button
                                        onClick={() => setShowBucket(false)}
                                        className="text-xl hover:text-red-400 transition-all"
                                    >
                                        ✕
                                    </button>
                                </div>
                                <div className="p-6">
                                    {flaggedIds.length === 0 ? (
                                        <p className="text-center text-slate-400">No questions marked for review.</p>
                                    ) : (
                                        <>
                                            <div className="space-y-4">
                                                {masterBank.filter(q => flaggedIds.includes(q.id)).map((q, idx) => (
                                                    <div key={q.id} className="p-4 border-2 rounded-lg">
                                                        <p className="font-bold mb-2">{idx + 1}. {q.q}</p>
                                                        <div className="space-y-1">
                                                            {q.opt.map((opt, oi) => (
                                                                <p key={oi}>{String.fromCharCode(65 + oi)}. {opt}</p>
                                                            ))}
                                                        </div>
                                                        <button
                                                            onClick={() => toggleFlag(q.id)}
                                                            className="mt-2 text-red-500 text-sm underline"
                                                        >
                                                            Remove
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-6 flex justify-end">
                                                <button
                                                    onClick={downloadFlaggedPdf}
                                                    className="px-6 py-2 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition-all"
                                                >
                                                    Download as PDF
                                                </button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'results' && sessionResults && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-4xl font-black">Quiz Completed!</h2>
                                <div className="flex gap-4">
                                    <button
                                        onClick={() => setView('menu')}
                                        className="px-6 py-2 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition-all"
                                    >
                                        New Quiz
                                    </button>
                                    <button
                                        onClick={() => { localStorage.clear(); setAttendedIds([]); setQuestionAttempts({}); setView('menu'); }}
                                        className="px-6 py-2 bg-red-600 rounded-lg font-bold hover:bg-red-500 transition-all"
                                    >
                                        Reset All
                                    </button>
                                </div>
                            </div>
                            <div className="grid grid-cols-4 gap-4 mb-8">
                                <div className={`p-6 rounded-lg ${t('bg-slate-800','bg-slate-100','bg-blue-100','bg-green-700','bg-black')}`}>
                                    <p className="text-sm text-slate-400 mb-2">Total Questions</p>
                                    <p className="text-3xl font-black text-blue-400">{sessionResults.totalQuestions}</p>
                                </div>
                                <div className={`p-6 rounded-lg ${t('bg-slate-800','bg-slate-100','bg-blue-100','bg-green-700','bg-black')}`}>
                                    <p className="text-sm text-slate-400 mb-2">Mode</p>
                                    <p className="text-3xl font-black text-purple-400">{sessionResults.mode === 'practice' ? 'Practice' : sessionResults.mode === 'assessment' ? 'Assessment' : 'Custom'}</p>
                                </div>
                                <div className={`p-6 rounded-lg ${t('bg-slate-800','bg-slate-100','bg-blue-100','bg-green-700','bg-black')}`}>
                                    <p className="text-sm text-slate-400 mb-2">Progress</p>
                                    <p className="text-2xl font-black text-green-400">{attendedIds.length} of {masterBank.length}</p>
                                </div>
                                <div className={`p-6 rounded-lg ${t('bg-slate-800','bg-slate-100','bg-blue-100','bg-green-700','bg-black')}`}>
                                    <p className="text-sm text-slate-400 mb-2">Score</p>
                                    <p className="text-3xl font-black text-yellow-400">
                                        {(() => {
                                            const answers = sessionResults.answers || [];
                                            const correct = sessionResults.questions.reduce((c, q, idx) => {
                                                const sel = answers[idx] || [];
                                                const isRight = q.ans.every(a => sel.includes(a)) && sel.every(s => q.ans.includes(s));
                                                return c + (isRight ? 1 : 0);
                                            }, 0);
                                            return `${correct} / ${sessionResults.totalQuestions}`;
                                        })()}
                                    </p>
                                </div>
                                {(sessionResults.mode === 'custom' || sessionResults.mode === 'assessment') && (
                                    <div className={`p-6 rounded-lg ${t('bg-slate-800','bg-slate-100','bg-blue-100','bg-green-700','bg-black')}`}>
                                        <p className="text-sm text-slate-400 mb-2">Time used</p>
                                        <p className="text-3xl font-black text-red-400">
                                            {(() => {
                                                const secs = Math.round((sessionResults.endTime - sessionResults.startTime)/1000);
                                                return `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
                                            })()}
                                        </p>
                                    </div>
                                )}
                            </div>

                            <h3 className="text-2xl font-black mb-4 mt-8">Session Questions Review</h3>
                            <div className="space-y-4">
                                {sessionResults.questions.map((q, idx) => {
                                    const userSel = sessionResults.answers ? sessionResults.answers[idx] || [] : [];
                                    return (
                                    <div key={idx} className={`p-4 border-2 rounded-lg ${t('border-slate-700','border-slate-300','border-blue-300','border-green-600','border-yellow-400')}`}>
                                        <p className="font-bold text-sm mb-2">Q{idx + 1}: {q.q}</p>
                                        <div className="text-xs space-y-1">
                                            {q.opt.map((opt, oIdx) => {
                                                const isCorrect = q.ans.includes(oIdx);
                                                const isSelected = userSel.includes(oIdx);
                                                let cls = '';
                                                if (isCorrect) cls = 'text-green-400 font-bold';
                                                if (isSelected && !isCorrect) cls = 'text-red-400 line-through';
                                                return (
                                                    <p key={oIdx} className={cls}>
                                                        {String.fromCharCode(65 + oIdx)}: {opt}{isSelected && !isCorrect ? ' (your choice)' : ''}{isCorrect && isSelected ? ' ✓' : ''}
                                                    </p>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )})}
                            </div>

                            <h3 className="text-2xl font-black mb-4">Overall Topic Map</h3>
                            {topicList.map(topic => (
                                <div key={topic} className="mb-8">
                                    <h4 className="text-lg font-bold mb-2">{topic}</h4>
                                    <div className="flex flex-wrap gap-1">
                                        {masterBank.filter(q => q.topic === topic).map(q => (
                                            <button
                                                key={q.id}
                                                onClick={() => alert(`${q.id}: ${q.q}\n\nAttempts: ${getAttemptCount(q.id)}`)}
                                                className={`w-6 h-6 rounded text-[10px] font-bold transition-all hover:scale-110 ${getColorByAttempts(q.id)} text-slate-900`}
                                                title={`Q: ${q.id}, Attempts: ${getAttemptCount(q.id)}`}
                                            >
                                                {masterBank.findIndex(x => x.id === q.id) % 100}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
