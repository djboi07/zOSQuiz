<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z/OS Expert Assessment Suite</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- pdf generation library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        /* semantic color variables for each theme */
        :root {
            --color-primary: #1e293b; /* slate-700 */
            --color-secondary: #374151; /* slate-600 */
            --color-accent: #facc15; /* yellow-400 */
            --color-neutral: #111827; /* slate-900 */
            --color-base-100: #020617;
            --color-info: #3b82f6; /* blue-500 */
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --color-fg-primary: #ffffff;
            --color-fg-secondary: #d1d5db;
        }
        .theme-light {
            --color-primary: #e5e7eb;
            --color-secondary: #d1d5db;
            --color-accent: #fde68a;
            --color-neutral: #f3f4f6;
            --color-base-100: #ffffff;
            --color-info: #60a5fa;
            --color-success: #4ade80;
            --color-warning: #facc15;
            --color-error: #f87171;
            --color-fg-primary: #000000;
            --color-fg-secondary: #374151;
        }
        .theme-blue {
            --color-primary: #bfdbfe;
            --color-secondary: #93c5fd;
            --color-accent: #fef08a;
            --color-neutral: #e0f2fe;
            --color-base-100: #eff6ff;
            --color-info: #3b82f6;
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --color-fg-primary: #1e3a8a;
            --color-fg-secondary: #1e40af;
        }
        .theme-solarized {
            --color-primary: #002b36;
            --color-secondary: #073642;
            --color-accent: #b58900;
            --color-neutral: #586e75;
            --color-base-100: #fdf6e3;
            --color-info: #268bd2;
            --color-success: #2aa198;
            --color-warning: #cb4b16;
            --color-error: #dc322f;
            --color-fg-primary: #869fa2;
            --color-fg-secondary: #8cb3c0;
        }
        .theme-highcontrast {
            --color-primary: #070707;
            --color-secondary: #1a1a1a;
            --color-accent: #ffff00;
            --color-neutral: #ffffff;
            --color-base-100: #000000;
            --color-info: #00ffff;
            --color-success: #00ff00;
            --color-warning: #ff00ff;
            --color-error: #ff0000;
            --color-fg-primary: #ffffff;
            --color-fg-secondary: #ffff00;
        }
        .bg-primary { background-color: var(--color-primary); }
        .bg-secondary { background-color: var(--color-secondary); }
        .bg-accent { background-color: var(--color-accent); }
        .bg-neutral { background-color: var(--color-neutral); }
        .bg-base-100 { background-color: var(--color-base-100); }
        .bg-info { background-color: var(--color-info); }
        .bg-success { background-color: var(--color-success); }
        .bg-warning { background-color: var(--color-warning); }
        .bg-error { background-color: var(--color-error); }
        .text-primary { color: var(--color-primary); }
        .text-fg-secondary { color: var(--color-secondary); }
        .text-accent { color: var(--color-accent); }
        .text-fg-secondary { color: var(--color-neutral); }
        .text-base-100 { color: var(--color-base-100); }
        .text-info { color: var(--color-info); }
        .text-success { color: var(--color-success); }
        .text-warning { color: var(--color-warning); }
        .text-error { color: var(--color-error); }
        .text-fg-primary { color: var(--color-fg-primary); }
        .text-fg-secondary { color: var(--color-fg-secondary); }
        body { font-family: 'Inter', sans-serif; background-color: inherit; color: inherit; }
        .tech-mono { font-family: 'JetBrains Mono', monospace; }
        .correct-glow { animation: glow-green 2s infinite; }
        @keyframes glow-green { 0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.2); } 50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); } }

        /* modern custom scrollbar styling */
        /* WebKit browsers */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(100,100,100,0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(100,100,100,0.7); }
        /* Firefox */
        * { scrollbar-width: thin; scrollbar-color: rgba(100,100,100,0.5) transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- THE DATA IMPORTER ---
        // Load a single master JSON file containing every question.
        // The file has already been merged and renumbered by topic.

        // helper which will be called in the component
        const loadQuestionBank = async () => {
            try {
                const resp = await fetch('master.json');
                if (!resp.ok) throw new Error('failed to fetch master.json');
                const arr = await resp.json();
                return arr.map(item => {
                    // ensure a unique ID; existing files already generated one
                    const id = `${item.topic.charAt(0)}${item.questionnumber}`;
                    const opts = [];
                    for (let i = 1; i <= 4; i++) {
                        const o = item[`option_${i}`];
                        if (o && o.trim() !== '') opts.push(o);
                    }
                    const ans = (item.correct_answer || []).map(a => {
                        const idx = parseInt(a.replace('option_',''), 10) - 1;
                        return isNaN(idx) ? null : idx;
                    }).filter(x => x !== null);
                    return {
                        id,
                        topic: item.topic,
                        q: item.question,
                        opt: opts,
                        ans,
                        questionnumber: item.questionnumber
                    };
                });
            } catch (e) {
                console.warn(e);
                return [];
            }
        };

        const App = () => {
            const [view, setView] = useState('menu');
            const [sessionQuestions, setSessionQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selected, setSelected] = useState([]);
            const [feedbackGiven, setFeedbackGiven] = useState(false);
            const [masterBank, setMasterBank] = useState([]);
            const [loadingBank, setLoadingBank] = useState(true);
            const themes = ['dark','light','blue','solarized','highcontrast'];
            const [themeIndex, setThemeIndex] = useState(0);
            const theme = themes[themeIndex];
            // helper to select per-theme value (order matches themes array)
            const t = (...vals) => vals[themeIndex] || vals[0];
            const [sessionResults, setSessionResults] = useState(null); // stores results after drill
            const [sessionAnswers, setSessionAnswers] = useState([]); // user selections per question
            const [sessionStartTime, setSessionStartTime] = useState(null); // timestamp when drill begins
            const [correctIds, setCorrectIds] = useState(() => {
                const saved = localStorage.getItem('zos_correct_ids');
                return saved ? JSON.parse(saved) : [];
            });

            // Persistence: Load attended question counts (not just IDs) from storage
            const [questionAttempts, setQuestionAttempts] = useState(() => {
                const saved = localStorage.getItem('zos_question_attempts');
                return saved ? JSON.parse(saved) : {};
            });

            const [attendedIds, setAttendedIds] = useState(() => {
                const saved = localStorage.getItem('zos_attended_ids');
                return saved ? JSON.parse(saved) : [];
            });

            // flagged questions for review
            const [flaggedIds, setFlaggedIds] = useState(() => {
                const saved = localStorage.getItem('zos_flagged_ids');
                return saved ? JSON.parse(saved) : [];
            });
            const [showBucket, setShowBucket] = useState(false);
            // panel always shown during drill; no state needed

            // user choices on home screen
            const [selectedTopics, setSelectedTopics] = useState([]);
            const [questionCount, setQuestionCount] = useState(2);            const [mode, setMode] = useState('practice'); // 'practice', 'assessment', or 'custom'
            const [timeLeft, setTimeLeft] = useState(90);
            const [customTimeMins, setCustomTimeMins] = useState(30); // total minutes for custom quiz
            const [showAnswer, setShowAnswer] = useState(false); // practice peek
            const [showQuestionModal, setShowQuestionModal] = useState(false);
            const [selectedQuestionForModal, setSelectedQuestionForModal] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(true); // home sidebar toggle
            // derive a unique topic list when bank loads
            const topicList = useMemo(() => {
                const set = new Set(masterBank.map(q => q.topic));
                return Array.from(set);
            }, [masterBank]);

            // load JSON bank once when component mounts
            useEffect(() => {
                (async () => {
                    const bank = await loadQuestionBank();
                    setMasterBank(bank);
                    setLoadingBank(false);
                })();
            }, []);

            // --- SESSION LOGIC ---
            // compute how many questions would be available with current filters
            const availableCount = useMemo(() => {
                // count questions not yet answered correctly
                let pool = masterBank.filter(q => !correctIds.includes(q.id));
                if (pool.length === 0) pool = masterBank.slice();
                if (selectedTopics.length > 0) {
                    pool = pool.filter(q => selectedTopics.includes(q.topic));
                }
                return pool.length;
            }, [masterBank, correctIds, selectedTopics]);

            const toggleFlag = (qid) => {
                let newArr;
                if (flaggedIds.includes(qid)) {
                    newArr = flaggedIds.filter(x => x !== qid);
                } else {
                    newArr = [...flaggedIds, qid];
                }
                setFlaggedIds(newArr);
                localStorage.setItem('zos_flagged_ids', JSON.stringify(newArr));
            };

            const getDrillColor = (idx) => {
                // determine based on answers
                if (!sessionAnswers[idx] || sessionAnswers[idx].length === 0) {
                    return 'bg-secondary';
                }
                const sel = sessionAnswers[idx];
                const q = sessionQuestions[idx];
                const isCorr = q.ans.every(a => sel.includes(a)) && sel.every(s => q.ans.includes(s));
                return isCorr ? 'bg-success' : 'bg-error';
            };

            const downloadFlaggedPdf = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const flaggedQuestions = masterBank.filter(q => flaggedIds.includes(q.id));
                if (flaggedQuestions.length === 0) return;
                flaggedQuestions.forEach((q, idx) => {
                    if (idx > 0) doc.addPage();
                    // Title
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(18);
                    doc.setTextColor('#2563eb');
                    doc.text('z/OS Review Bucket', 10, 15);
                    doc.setFontSize(12);
                    doc.setTextColor('#334155');
                    doc.text(`Exported: ${new Date().toLocaleDateString()}`, 150, 15, { align: 'right' });
                    // Topic
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(12);
                    doc.setTextColor('#0ea5e9');
                    doc.text(`Topic: ${q.topic}`, 10, 25);
                    // render question with wrapping inside colored box
                    // prepare question text (collapse internal whitespace)
                    const cleanQuestion = `${idx + 1}. ${q.q}`.replace(/\s+/g, ' ').trim();
                    const qLines = doc.splitTextToSize(cleanQuestion, 170);
                    const qHeight = qLines.length * 7 + 8; // a little more vertical room
                    doc.setDrawColor('#2563eb');
                    doc.setFillColor('#e0e7ff');
                    doc.roundedRect(10, 30, 190, qHeight, 3, 3, 'F');
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(13);
                    doc.setTextColor('#1e293b');
                    doc.text(qLines, 15, 34, { lineHeightFactor: 1.2 });
                    // Options list
                    let y = 30 + qHeight + 10;
                    q.opt.forEach((opt, oi) => {
                        const isCorrect = q.ans.includes(oi);
                        const cleanOpt = opt.replace(/\s+/g, ' ').trim();
                        const optLines = doc.splitTextToSize(`${String.fromCharCode(65 + oi)}. ${cleanOpt}` + (isCorrect ? ' ✅' : ''), 172);
                        const rectHeight = optLines.length * 7 + 6;
                        doc.setDrawColor(isCorrect ? '#22c55e' : '#cbd5e1');
                        doc.setFillColor(isCorrect ? '#dcfce7' : '#f1f5f9');
                        doc.roundedRect(15, y - 4, 180, rectHeight, 2, 2, 'F');
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(11);
                        doc.setTextColor('#334155');
                        doc.text(optLines, 20, y + 2, { lineHeightFactor: 1.15 });
                        y += rectHeight + 6;
                    });
                    // Footer
                    doc.setFontSize(10);
                    doc.setTextColor('#64748b');
                    doc.text('Generated by z/OS Assessment Suite', 10, 285);
                });
                doc.save('flagged_questions.pdf');
                // clear after download
                setFlaggedIds([]);
                localStorage.removeItem('zos_flagged_ids');
            };

            const startNewDrill = () => {
                if (loadingBank) return; // still loading

                // Build pool based on mode
                let pool;
                if (mode === 'practice') {
                    // unattended questions only (never seen before)
                    pool = masterBank.filter(q => !attendedIds.includes(q.id));
                } else if (mode === 'assessment') {
                    // unattended questions (fresh each assessment)
                    pool = masterBank.filter(q => !attendedIds.includes(q.id));
                } else {
                    // custom: include everything in bank
                    pool = masterBank.slice();
                }

                // apply topic filters uniformly
                if (selectedTopics.length > 0) {
                    pool = pool.filter(q => selectedTopics.includes(q.topic));
                }

                // fallback when pool is empty
                if (pool.length === 0) {
                    if (mode === 'practice' || mode === 'assessment') {
                        // allow previously attended but not yet correct
                        pool = masterBank.filter(q => !correctIds.includes(q.id));
                        if (selectedTopics.length > 0) {
                            pool = pool.filter(q => selectedTopics.includes(q.topic));
                        }
                    } else {
                        // custom already full bank
                        pool = masterBank.slice();
                        if (selectedTopics.length > 0) {
                            pool = pool.filter(q => selectedTopics.includes(q.topic));
                        }
                    }
                }

                // order questions
                if (mode === 'assessment') {
                    pool = pool.sort(() => Math.random() - 0.5);
                } else if (mode === 'practice') {
                    const num = id => parseInt(id.replace(/^[^0-9]+/, ''), 10) || 0;
                    pool = pool.sort((a,b) => num(a.id) - num(b.id));
                }

                const count = Math.max(1, Math.min(questionCount, pool.length));
                const drillSet = pool.slice(0, count);

                setSessionQuestions(drillSet);
                setCurrentIdx(0);
                setSessionAnswers(Array(drillSet.length).fill([]));
                setSessionStartTime(Date.now());
                setView('drill');
                setFeedbackGiven(false);
                setSelected([]);
                setShowAnswer(false);
                // reset timer when new drill starts
                if (mode === 'assessment') {
                    setTimeLeft(90);
                } else if (mode === 'custom') {
                    setTimeLeft(Math.round(customTimeMins * 60));
                }
            };

            const handleSubmit = () => {
                setFeedbackGiven(true);
                const currentId = sessionQuestions[currentIdx].id;
                
                // determine correctness
                const isCorrect = sessionQuestions[currentIdx].ans.every(a => selected.includes(a)) && selected.every(s => sessionQuestions[currentIdx].ans.includes(s));

                // record the user's selection for review
                setSessionAnswers(prev => {
                    const arr = [...prev];
                    arr[currentIdx] = selected;
                    return arr;
                });

                // Persistence: Mark as attended and increment attempt count
                if (!attendedIds.includes(currentId)) {
                    const newAttended = [...attendedIds, currentId];
                    setAttendedIds(newAttended);
                    localStorage.setItem('zos_attended_ids', JSON.stringify(newAttended));
                }

                // update correct set
                let newCorrect = [...correctIds];
                if (isCorrect) {
                    if (!newCorrect.includes(currentId)) {
                        newCorrect.push(currentId);
                    }
                } else {
                    newCorrect = newCorrect.filter(id => id !== currentId);
                }
                setCorrectIds(newCorrect);
                localStorage.setItem('zos_correct_ids', JSON.stringify(newCorrect));

                // Track attempt count
                const newAttempts = { ...questionAttempts };
                newAttempts[currentId] = (newAttempts[currentId] || 0) + 1;
                setQuestionAttempts(newAttempts);
                localStorage.setItem('zos_question_attempts', JSON.stringify(newAttempts));
            };

            const handleNext = () => {
                if (currentIdx < sessionQuestions.length - 1) {
                    setCurrentIdx(prev => prev + 1);
                    setFeedbackGiven(false);
                    setSelected([]);
                    setShowAnswer(false);
                } else {
                    // Fix: Populate sessionResults before switching views
                    setSessionResults({
                        totalQuestions: sessionQuestions.length,
                        mode: mode,
                        questions: sessionQuestions,
                        answers: sessionAnswers,
                        startTime: sessionStartTime,
                        endTime: Date.now()
                    });
                    setView('results');
                }
            };

            // timer effects for assessment mode
            useEffect(() => {
                if (view === 'drill' && !feedbackGiven) {
                    // only reset timer upon drill start or when mode changes
                    if (mode === 'assessment') {
                        setTimeLeft(90);
                    }
                    const interval = setInterval(() => {
                        setTimeLeft(t => (t > 0 ? t - 1 : 0));
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [view, mode, feedbackGiven]);

            useEffect(() => {
                if ((mode === 'assessment' || mode === 'custom') && view === 'drill' && timeLeft === 0) {
                    // timer expired: stop and reveal correct answer but do not advance
                    setFeedbackGiven(true);
                }
            }, [timeLeft, mode, view]);

            // Helper functions
            const getAttemptCount = (qId) => questionAttempts[qId] || 0;

            const getColorByAttempts = (qId) => {
                const count = getAttemptCount(qId);
                if (count === 0) {
                    // neutral when never attempted
                    return t('bg-primary','bg-primary','bg-primary','bg-primary','bg-primary');
                }
                // distinct gradient from yellow to red as attempts increase
                const gradient = ['bg-yellow-200','bg-yellow-300','bg-orange-300','bg-orange-400','bg-red-400','bg-red-500','bg-red-600','bg-red-700'];
                return gradient[Math.min(count-1, gradient.length - 1)];
            };

            const getOptionStyles = (idx) => {
                const q = sessionQuestions[currentIdx];
                const isCorrect = q.ans.includes(idx);
                const isUserSelected = selected.includes(idx);

                // before feedback given
                if (!feedbackGiven) {
                    if (mode === 'practice' && showAnswer) {
                        // highlight correct answer in practice peek with solid colours
                        if (isCorrect) return 'border-success bg-success text-base-100 font-bold';
                        // dim non-correct options so the highlight stands out
                        return 'border-secondary opacity-30';
                    }
                    return isUserSelected 
                        ? 'border-info bg-info text-base-100' 
                        : 'border-secondary hover:border-secondary/80 bg-primary/50';
                }

                if (isCorrect) return 'border-success bg-success text-base-100 correct-glow font-bold';
                if (isUserSelected && !isCorrect) return 'border-error bg-error text-base-100 font-bold strike-through';
                return 'border-neutral opacity-30 grayscale';
            };

            return (
                <div className={`min-h-screen p-6 flex flex-col ${t('bg-base-100 text-fg-primary','bg-base-100 text-fg-primary','bg-base-100 text-fg-primary','bg-base-100 text-fg-primary','bg-base-100 text-fg-primary')}`}>
                    {/* Header Persistence Stats */}
                    <div className={`flex justify-between items-center mb-10 border-b ${t('border-secondary','border-secondary','border-secondary','border-secondary','border-secondary')} pb-4`}>
                        <div className="flex items-center gap-3">
                            {/* map toggle */}
                            <button
                                onClick={() => setSidebarOpen(open => !open)}
                                className={"px-3 py-2 rounded-lg text-sm font-bold transition-all " + t('bg-primary hover:bg-secondary font-fg-primary text-fg-primary')}
                                title={sidebarOpen ? 'Hide Map' : 'Show Map'}
                            >
                                ☰
                            </button>

                            <h1 className="font-extrabold tracking-tighter text-xl">z/OS Assessment</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            {view !== 'menu' && (
                                <button
                                    onClick={() => setView('menu')}
                                    className={"px-4 py-2 rounded-lg text-sm font-bold transition-all " + t('bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100')}
                                >
                                    Home
                                </button>
                            )}
                            {view === 'drill' && (
                                <div className={"text-[10px] uppercase font-bold tracking-widest " + t('text-fg-secondary','text-fg-secondary','text-info','text-success','text-accent')}>
                                    {attendedIds.length} / {loadingBank ? '...' : masterBank.length}
                                </div>
                            )}
                            {/* always-visible question map is on right side */}
                            {/* review bucket icon (save/floppy) */}
                            <button
                                onClick={() => setShowBucket(true)}
                                className="relative px-2 py-2 bg-primary rounded-lg text-sm font-bold hover:bg-secondary transition-all"
                                title="Review Bucket"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm5-10H7V5h10v4z" />
                                </svg>
                                {flaggedIds.length > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-error text-[10px] w-4 h-4 rounded-full flex items-center justify-center">
                                        {flaggedIds.length}
                                    </span>
                                )}
                            </button>
                            <button
                                onClick={() => {
                                    const next = (themeIndex + 1) % themes.length;
                                    setThemeIndex(next);
                                    document.body.className = `theme-${themes[next]}`;
                                }}
                                className={"px-4 py-2 rounded-lg text-sm font-bold transition-all " + t('bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100','bg-primary hover:bg-secondary font-fg-primary text-fg-primary text-base-100')}
                            >
                                {theme.charAt(0).toUpperCase() + theme.slice(1)}
                            </button>
                        </div>
                    </div>



                    {view === 'menu' && (
                        <div className="relative flex-1">

                            {/* overlay backdrop when open */}
                            {sidebarOpen && (
                                <div
                                    className="fixed inset-0 bg-black/40 z-40"
                                    onClick={() => setSidebarOpen(false)}
                                />
                            )}

                            {/* sidebar as modal panel */}
                            {sidebarOpen && (
                                <div className={"fixed left-0 top-0 bottom-0 w-96 p-4 z-50 overflow-y-auto " + t('bg-primary text-base-100','bg-base-100 text-fg-primary','bg-base-100 text-fg-primary','bg-base-100 text-fg-primary','bg-primary text-base-100') }>
                                    {!loadingBank && masterBank.length > 0 && (
                                        <>
                                            <p className="text-sm text-fg-primary font-semibold mb-4">Overall Topic Progress (click to preview):</p>
                                            {topicList.map(topic => (
                                                <div key={topic} className="mb-6">
                                                    <h4 className="text-lg text-fg-primary font-bold mb-2">{topic} ({masterBank.filter(q => q.topic === topic).length}Q)</h4>
                                                    <div className="flex flex-wrap gap-1">
                                                        {masterBank.filter(q => q.topic === topic).map(q => (
                                                            <button
                                                                key={q.id}
                                                                onClick={() => {
                                                                    const idx = masterBank.findIndex(x=>x.id===q.id);

                                                key={q.id}
                                                onClick={() => alert(`${q.id}: ${q.q}\n\nAttempts: ${getAttemptCount(q.id)}`)}
                                                className={`w-6 h-6 rounded text-[10px] font-bold transition-all hover:scale-110 ${getColorByAttempts(q.id)} text-fg-secondary`}
                                                title={`Q: ${q.id}, Attempts: ${getAttemptCount(q.id)}`}
                                            >
                                                {q.questionnumber || (masterBank.findIndex(x => x.id === q.id) % 100)}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
